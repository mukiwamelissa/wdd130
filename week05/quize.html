<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML & CSS Quiz</title>
    <link rel="stylesheet" href="styles/quize.css">


</head>

<body>

    <div class="quiz-container">
        <h1>HTML & CSS Knowledge Quiz</h1>

        <form action="#" method="post">

            <label for="q1">
                1. What HTML tag is used to create a hyperlink?
            </label>
            <input type="text" id="q1" name="q1">

            <label for="q2">
                2. Explain the purpose of CSS in web development.
            </label>
            <textarea id="q2" name="q2" rows="4"></textarea>

            <label for="q3">
                3. Which CSS property is used to change text color?
            </label>
            <select id="q3" name="q3">
                <option value="" selected disabled>Choose One ...</option>
                <option value="font-size">font-size</option>
                <option value="color">color</option>
                <option value="background-color">background-color</option>
            </select>

            <label for="q4">
                4. How many heading levels does HTML provide?
            </label>
            <input type="number" id="q4" name="q4" min="1">

            <button type="submit">Submit Quiz</button>

        </form>
    </div>

</body>

</html>
