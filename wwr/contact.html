<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | White Water Rafting</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <header>
        <img src="images/logo.jpg" alt="Rafting Logo" class="logo">

        <nav>
            <a href="#">Home</a>
            <a href="#">About Us</a>
            <a href="#">Trips</a>
            <a href="#">Contact Us</a>
        </nav>
    </header>

    <main>

        <section class="company-info">
            <h1>White Water Rafting Company</h1>
            <p>123 Main River Street</p>
            <p>Kolob, California</p>
            <p>+1 999 999 9999</p>
            <p>info@whitewater.com</p>
        </section>

        <section class="contact-container">

            <div class="map">
                <iframe>
                    <iframe
                      src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d3879.9351664417395!2d28.078731297190032!3d-26.177804748580634!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sza!4v1780958438844!5m2!1sen!2sza"
                      allowfullscreen="" loading="lazy"
                      referrerpolicy="no-referrer-when-downgrade"></iframe>
                </iframe>
            </div>

            <form class="contact-form">
                <label for="name">Name</label>
                <input type="text" id="name">

                <label for="email">Email</label>
                <input type="email" id="email">

                <p>Message Purpose</p>

                <label>
                    <input type="radio" name="purpose">
                    General Inquiry
                </label>

                <label>
                    <input type="radio" name="purpose">
                    Reservation Question
                </label>

                <label>
                    <input type="radio" name="purpose">
                    Website Suggestion
                </label>

                <label for="message">Message</label>
                <textarea id="message" rows="5"></textarea>

                <label>
                    <input type="checkbox">
                    Please subscribe me to the monthly newsletter
                </label>

                <button type="submit">Get In Touch</button>
            </form>

        </section>

        <section class="employees">
            <h2>We Are Here to Serve You</h2>

            <div class="employee-grid">

                <figure>
                    <img src="images/employee1.jpg" alt="Employee">
                    <figcaption>Employee Profile</figcaption>
                </figure>

                <figure>
                    <img src="images/employee2.jpg" alt="Employee">
                    <figcaption>Employee Profile</figcaption>
                </figure>

                <figure>
                    <img src="images/employee3.jpg" alt="Employee">
                    <figcaption>Employee Profile</figcaption>
                </figure>

            </div>
        </section>

    </main>

</body>

<footer>
    <p>©️2026 ※ White Water Raft ※ Melissa</p>
    <nav class="socialmedia">
        <a href="https://facebook.com">
            <img src="images/facebook.svg" alt="facebook icon">
        </a>
        <a href="instagrm.com">
            <img src="images/instagram.svg" alt="instagram icon">
        </a>
        <a href="twitter.com">
            <img src="images/twitter.svg" alt="twitter icon">
        </a>
    </nav>
</footer>


</body>

</html>
