<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | White Water Rafting</title>
    <meta name="description"
      content="White water rafting is a type of recreation that involves navigating a non-motorized watercraft down free flowing rivers Contact us for further information.">
    <meta name="author" content="Melissa">

    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <header>
        <img src="images/logo.jpg" alt="Rafting Logo" class="logo">

        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>

    </header>

    <main>

        <section class="company-info">
            <h1>White Water Rafting Company</h1>
            <p>123 Main River Street</p>
            <p>Kolob, California</p>
            <p>+1 999 999 9999</p>
            <p>info@whitewater.com</p>
        </section>

        <section class="contact-container">


            <div class="map">
                <h2>Find Us</h2>
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d7162.295257384102!2d28.02768338439599!3d-26.159321145627207!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x1e950c878c1ac687%3A0xe69330146226fd9d!2sZoo%20Lake!5e0!3m2!1sen!2sza!4v1781293187355!5m2!1sen!2sza"
                  allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>

            <form class="contact-form">
                <label for="name">Name</label>
                <input type="text" id="name">

                <label for="email">Email</label>
                <input type="email" id="email">

                <p>Message Purpose</p>

                <label>
                    <input type="radio" name="purpose">
                    General Inquiry
                </label>

                <label>
                    <input type="radio" name="purpose">
                    Reservation Question
                </label>

                <label>
                    <input type="radio" name="purpose">
                    Website Suggestion
                </label>

                <label for="message">Message</label>
                <textarea id="message" rows="5"></textarea>

                <label>
                    <input type="checkbox">
                    Please subscribe me to the monthly newsletter
                </label>

                <button type="submit">Get In Touch</button>
            </form>

        </section>

        <section class="employees">
            <h2>We Are Here to Serve You</h2>

            <div class="employee-grid">

                <figure>
                    <img src="images/employee1.jpg" alt="Employee1_profile">
                    <figcaption>Employee Profile</figcaption>
                </figure>

                <figure>
                    <img src="images/employee2.jpg" alt="Employee2_profile">
                    <figcaption>Employee Profile</figcaption>
                </figure>

                <figure>
                    <img src="images/employee3.jpg" alt="Employee3_profile">
                    <figcaption>Employee Profile</figcaption>
                </figure>

            </div>
        </section>
    </main>

    <footer>
        <p>©️2026 ※ White Water Raft ※ Melissa</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.svg" alt="facebook icon">
            </a>
            <a href="instagrm.com">
                <img src="images/instagram.svg" alt="instagram icon">
            </a>
            <a href="twitter.com">
                <img src="images/twitter.svg" alt="twitter icon">
            </a>
        </nav>
    </footer>


</body>

</html>
